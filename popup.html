<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 340px; padding: 12px; font-family: system-ui, -apple-system, sans-serif; background: #fafafa; }
    h3 { margin: 0 0 12px; font-size: 15px; color: #111; }
    label { display: block; margin: 10px 0 4px; font-size: 12px; color: #666; font-weight: 500; }
    input, textarea { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; }
    button { width: 100%; margin: 6px 0; padding: 9px; cursor: pointer; border: none; border-radius: 6px; background: #0066cc; color: white; font-weight: 500; transition: 0.2s; }
    button:hover { background: #0052a3; }
    button:disabled { background: #aaa; cursor: not-allowed; }
    button.secondary { background: #444; }
    button.secondary:hover { background: #333; }
    #status { margin-top: 10px; font-size: 12px; color: #28a745; min-height: 18px; padding: 4px 0; }
    .error { color: #dc3545 !important; }
    hr { border: none; border-top: 1px solid #e0e0e0; margin: 14px 0; }
    .file-input { display: none; }
  </style>
</head>
<body>
  <h3>🎯 Chat DOM Trainer</h3>

  <label>🔍 Фраза для поиска поля ввода:</label>
  <input type="text" id="searchPhrase" placeholder="Например: тест123">
  <button id="btnDetectInput">Определить поле</button>

  <button id="btnDetectSend" class="secondary">📍 Определить кнопку Send</button>

  <hr>

  <label>💬 Сообщение для отправки:</label>
  <textarea id="msgToSend" rows="3" placeholder="Введите текст..."></textarea>
  <button id="btnSend"> Отправить</button>

  <hr>
  <div style="display:flex; gap:6px;">
    <button id="btnExport" class="secondary">💾 Экспорт JSON</button>
    <button id="btnImport" class="secondary">📂 Импорт JSON</button>
  </div>
  <input type="file" id="fileInput" accept=".json" class="file-input">

  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
