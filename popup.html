<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 320px; padding: 15px; font-family: system-ui, sans-serif; }
    h3 { margin: 0 0 15px 0; font-size: 16px; }
    .section { margin-bottom: 12px; padding: 10px; border: 1px solid #eee; border-radius: 6px; }
    input { width: 100%; padding: 6px; margin-bottom: 6px; box-sizing: border-box; }
    button { width: 100%; padding: 8px; margin: 4px 0; cursor: pointer; border: none; border-radius: 4px; color: #fff; }
    .btn-green { background: #4CAF50; }
    .btn-blue { background: #2196F3; }
    .btn-orange { background: #FF9800; }
    #status { padding: 8px; margin: 10px 0; border-radius: 4px; text-align: center; font-size: 13px; display: none; }
    #status.show { display: block; }
    #status.error { background: #ffebee; color: #c62828; }
    #status.success { background: #e8f5e9; color: #2e7d32; }
  </style>
</head>
<body>
  <h3>🎯 Chat DOM Trainer</h3>
  <div id="status"></div>

  <div class="section">
    <input type="text" id="searchPhrase" placeholder="Фраза для поиска поля...">
    <button id="btnDetectInput" class="btn-green">Определить поле ввода</button>
  </div>

  <div class="section">
    <button id="btnDetectSend" class="btn-blue">Определить кнопку Send</button>
  </div>

  <div class="section">
    <input type="text" id="msgToSend" placeholder="Сообщение для отправки...">
    <button id="btnSend" class="btn-orange">Отправить</button>
  </div>

  <div class="section">
    <button id="btnExport" class="btn-green"> Экспорт JSON</button>
    <button id="btnImport" class="btn-blue">📂 Импорт JSON</button>
    <input type="file" id="fileInput" accept=".json" style="display:none">
  </div>

  <script src="popup.js"></script>
</body>
</html>
